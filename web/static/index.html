<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Engine 管理面板</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- 侧边栏 -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>⚙️ Chat Engine</h2>
            </div>
            <ul class="nav-list">
                <li class="nav-item active" data-tab="personas">🎭 人格管理</li>
                <li class="nav-item" data-tab="sessions">💬 会话管理</li>
                <li class="nav-item" data-tab="memories">🧠 记忆管理</li>
                <li class="nav-item" data-tab="proactive">⚡ 主动回复</li>
                <li class="nav-item" data-tab="tools">🔧 工具管理</li>
                <li class="nav-item" data-tab="config">📝 配置设置</li>
            </ul>
            <div class="sidebar-footer" id="sidebar-footer" style="display:none;padding:12px 20px;border-top:1px solid var(--border);margin-top:auto;">
                <button class="btn btn-secondary" onclick="logout()" style="width:100%;">🚪 退出登录</button>
            </div>
        </nav>

        <!-- 主内容区 -->
        <main class="content">
            <!-- 人格管理 -->
            <section id="tab-personas" class="tab-panel active">
                <div class="panel-header">
                    <h3>人格管理</h3>
                    <button class="btn btn-primary" onclick="showPersonaModal()">+ 新建人格</button>
                </div>
                <div id="persona-list" class="card-list"></div>
            </section>

            <!-- 会话管理 -->
            <section id="tab-sessions" class="tab-panel">
                <div class="panel-header">
                    <h3>会话管理</h3>
                    <button class="btn btn-secondary" onclick="loadSessions()">🔄 刷新</button>
                </div>
                <div id="session-list" class="card-list"></div>
                <div id="session-pagination" class="pagination"></div>
            </section>

            <!-- 记忆管理 -->
            <section id="tab-memories" class="tab-panel">
                <div class="panel-header">
                    <h3>记忆管理</h3>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <select id="memory-session-select" onchange="onMemorySessionChange()" style="max-width:400px;">
                            <option value="">选择会话...</option>
                        </select>
                        <button class="btn btn-secondary" onclick="loadMemorySessionList()">🔄 刷新会话</button>
                    </div>
                </div>
                <div id="memory-content" style="display:none;">
                    <div class="memory-panels">
                        <div class="memory-panel">
                            <div class="memory-panel-header">
                                <h4>📝 短期记忆</h4>
                                <button class="btn btn-small btn-primary" onclick="showAddMemoryModal('short_term')">+ 添加</button>
                            </div>
                            <div id="short-term-list" class="card-list"></div>
                        </div>
                        <div class="memory-panel">
                            <div class="memory-panel-header">
                                <h4>💾 长期记忆</h4>
                                <button class="btn btn-small btn-primary" onclick="showAddMemoryModal('long_term')">+ 添加</button>
                            </div>
                            <div id="long-term-list" class="card-list"></div>
                        </div>
                    </div>
                </div>
                <div id="memory-empty" class="card">
                    <div class="card-body">请先选择一个会话以查看记忆。</div>
                </div>
            </section>

            <!-- 主动回复 -->
            <section id="tab-proactive" class="tab-panel">
                <div class="panel-header">
                    <h3>主动回复</h3>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <select id="proactive-session-select" onchange="onProactiveSessionChange()" style="max-width:400px;">
                            <option value="">选择会话...</option>
                        </select>
                        <button class="btn btn-secondary" onclick="loadProactiveSessionList()">🔄 刷新会话</button>
                    </div>
                </div>
                <div id="proactive-settings" class="card" style="display:none;margin-top:8px;padding:8px 12px;">
                    <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;">
                        <span style="font-weight:600;">⚡ 会话级开关</span>
                        <label style="display:flex;align-items:center;gap:4px;cursor:pointer;">
                            <input type="checkbox" id="proactive-timeout-toggle" onchange="toggleProactiveTimeout()">
                            ⏰ 超时主动发言
                        </label>
                        <label id="proactive-round-label" style="display:flex;align-items:center;gap:4px;cursor:pointer;">
                            <input type="checkbox" id="proactive-round-toggle" onchange="toggleProactiveRound()">
                            🔄 轮数触发（仅群聊）
                        </label>
                    </div>
                </div>
                <div id="proactive-empty" class="card">
                    <div class="card-body">请先选择一个会话以配置主动回复设置。全局开关在「配置设置」中。</div>
                </div>
            </section>

            <!-- 工具管理 -->
            <section id="tab-tools" class="tab-panel">
                <div class="panel-header">
                    <h3>工具管理</h3>
                    <button class="btn btn-secondary" onclick="refreshTools()">🔄 重新扫描</button>
                </div>
                <div id="tool-list" class="card-list"></div>
            </section>

            <!-- 配置设置 -->
            <section id="tab-config" class="tab-panel">
                <div class="panel-header">
                    <h3>配置设置</h3>
                </div>
                <div id="config-form" class="config-form"></div>
            </section>
        </main>
    </div>

    <!-- 人格编辑模态框 -->
    <div id="persona-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">新建人格</h3>
                <button class="btn-close" onclick="hidePersonaModal()">&times;</button>
            </div>
            <form id="persona-form" onsubmit="savePersona(event)">
                <input type="hidden" id="persona-id">
                <div class="form-group">
                    <label for="persona-name">名称</label>
                    <input type="text" id="persona-name" required placeholder="给这个人格起个名字">
                </div>
                <div class="form-group">
                    <label for="persona-prompt">System Prompt</label>
                    <textarea id="persona-prompt" rows="12" required placeholder="定义这个 AI 人格的系统提示词..."></textarea>
                </div>
                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="persona-default"> 设为默认人格
                    </label>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="hidePersonaModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 会话详情模态框 -->
    <div id="session-modal" class="modal hidden">
        <div class="modal-content modal-wide">
            <div class="modal-header">
                <h3 id="session-modal-title">会话上下文</h3>
                <div class="modal-actions">
                    <button class="btn btn-secondary btn-small" id="btn-llm-preview" onclick="showLlmPreview()">LLM 预览</button>
                    <button class="btn-close" onclick="hideSessionModal()">&times;</button>
                </div>
            </div>
            <div id="session-detail" class="session-detail"></div>
        </div>
    </div>

    <!-- LLM 预览模态框 -->
    <div id="llm-preview-modal" class="modal hidden">
        <div class="modal-content modal-wide">
            <div class="modal-header">
                <h3>LLM 上下文预览</h3>
                <button class="btn-close" onclick="hideLlmPreview()">&times;</button>
            </div>
            <div id="llm-preview-content" class="llm-preview"></div>
        </div>
    </div>

    <!-- 记忆编辑模态框 -->
    <div id="memory-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="memory-modal-title">添加记忆</h3>
                <button class="btn-close" onclick="hideMemoryModal()">&times;</button>
            </div>
            <form id="memory-form" onsubmit="saveMemory(event)">
                <input type="hidden" id="memory-type">
                <input type="hidden" id="memory-edit-id">
                <div class="form-group" id="memory-pinned-group" style="display:none;">
                    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                        <input type="checkbox" id="memory-pinned">
                        📌 置顶（每次对话始终生效，适用于规则、偏好等）
                    </label>
                </div>
                <div class="form-group">
                    <label for="memory-content-input">记忆内容</label>
                    <textarea id="memory-content-input" rows="4" required placeholder="输入记忆内容..." maxlength="500"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="hideMemoryModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
